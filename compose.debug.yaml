services:
  proyekt2:
    image: proyekt2
    build:
      context: .
      dockerfile: ./Dockerfile.debug
    command: ["python", "-m", "debugpy", "--wait-for-client", "--listen", "0.0.0.0:5678", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - 8000:8000
      - 5678:5678
    environment:
      - PYTHONUNBUFFERED=1
